<!DOCTYPE html>
<html>
<head><title>Вход</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<div class="row justify-content-center"><div class="col-md-4">
<h2>Вход</h2>
<input class="form-control mb-2" id="u" placeholder="Логин">
<input class="form-control mb-2" id="p" type="password" placeholder="Пароль">
<button class="btn btn-primary w-100 mb-2" onclick="login()">Войти</button>
<button class="btn btn-success w-100" onclick="reg()">Регистрация</button>
<div id="msg"></div>
</div></div>
<script>
async function login(){
const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:document.getElementById('u').value,password:document.getElementById('p').value}),credentials:'include'});
if(r.ok){location.href='/';}else{msg.innerHTML='<div class="alert alert-danger">Ошибка входа</div>';}
}
async function reg(){
const r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:document.getElementById('u').value,password:document.getElementById('p').value}),credentials:'include'});
if(r.ok){location.href='/';}else{msg.innerHTML='<div class="alert alert-danger">Ошибка регистрации</div>';}
}
</script>
</body>
</html>
